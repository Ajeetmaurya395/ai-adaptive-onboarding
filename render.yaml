services:
  - type: web
    name: ai-onboarding-api
    runtime: python
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: HF_TOKEN
        sync: false
      - key: MODEL_NAME
        value: Qwen/Qwen2.5-7B-Instruct
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: ai_onboarding
      - key: DATA_SOURCE
        value: cloud
      - key: HF_DATASET_REPO
        sync: false
      - key: CACHE_DIR
        value: /tmp/ai_onboarding/data
      - key: VECTOR_BACKEND
        value: atlas
      - key: VECTOR_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: ATLAS_VECTOR_FIELD
        value: embedding
      - key: ATLAS_SKILLS_COLLECTION
        value: skill_vectors
      - key: ATLAS_SKILLS_INDEX
        value: skills_vector_index
      - key: ATLAS_OCCUPATIONS_COLLECTION
        value: occupation_vectors
      - key: ATLAS_OCCUPATIONS_INDEX
        value: occupations_vector_index
      - key: ATLAS_COURSES_COLLECTION
        value: course_vectors
      - key: ATLAS_COURSES_INDEX
        value: courses_vector_index

  - type: web
    name: ai-onboarding-ui
    runtime: python
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/ui.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: API_HOST
        fromService:
          type: web
          name: ai-onboarding-api
          property: host
      - key: API_PORT
        fromService:
          type: web
          name: ai-onboarding-api
          property: port
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: ai_onboarding
